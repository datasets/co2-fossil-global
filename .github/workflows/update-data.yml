name: Update CO2 data

on:
  # GCP publishes the annual Global Carbon Budget in November each year
  schedule:
    - cron: "0 6 1 12 *"  # 1 Dec — data is usually out by then
  workflow_dispatch:
    inputs:
      gcp_url:
        description: "Override GCP CSV URL (leave blank to use default in update.py)"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python3 scripts/update.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Get latest data year
        id: year
        if: steps.diff.outputs.changed == 'true'
        run: |
          YEAR=$(tail -1 global.csv | cut -d',' -f1)
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: update to GCP ${{ steps.year.outputs.year }}"
          branch: "data/update-${{ steps.year.outputs.year }}"
          title: "Update data to ${{ steps.year.outputs.year }} (GCP annual release)"
          body: |
            Automated data update from the Global Carbon Project annual release.

            - Source: https://zenodo.org/records/latest (GCB MtCO2 flat CSV)
            - Data now runs through **${{ steps.year.outputs.year }}**
            - Updated files: `global.csv`, `data/fuel-breakdown.csv`

            Review the diff before merging to confirm the new year's data looks reasonable.
          labels: "data-update"
